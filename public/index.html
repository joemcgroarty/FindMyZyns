<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FindMyZyns" />
  <meta name="description" content="Find nicotine near you. Share with others. Build karma." />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <title>FindMyZyns</title>
  <style>
    html, body, #root { height: 100%; margin: 0; padding: 0; background: #0A0A0A; }
    .custom-marker { background: none !important; border: none !important; }
    /* Leaflet popup dark theme */
    .leaflet-popup-content-wrapper { background: #1A1A1A !important; color: #fff !important; border-radius: 12px !important; }
    .leaflet-popup-tip { background: #1A1A1A !important; }
    .leaflet-popup-close-button { color: #9CA3AF !important; }
  </style>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
